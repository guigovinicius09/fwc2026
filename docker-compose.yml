services:
  next-app:
    build: .
    container_name: next16-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: npm run dev